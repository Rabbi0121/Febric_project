apiVersion: 1

datasources:
  - name: InfluxDB-Weather
    uid: weather-influx
    type: influxdb
    access: proxy
    url: ${INFLUXDB_URL}
    isDefault: true
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
